<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaddleOCR 文字識別</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 1rem;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.online {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .status-dot.offline {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
        }

        .status-dot.checking {
            background: #ffaa00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .config-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .config-row {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .config-row label {
            color: #aaa;
            min-width: 80px;
        }

        .config-row input {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
        }

        .config-row input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }

        .upload-area.dragover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #aaa;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 0.85rem;
            color: #666;
        }

        #fileInput {
            display: none;
        }

        .preview-container {
            position: relative;
            margin-bottom: 20px;
            display: none;
        }

        .preview-container.show {
            display: block;
        }

        .preview-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        #previewImage {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            display: block;
        }

        #bboxCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .results-area {
            max-height: 500px;
            overflow-y: auto;
        }

        .result-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #00d4ff;
        }

        .result-text {
            font-size: 1.1rem;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .result-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: #888;
        }

        .confidence-bar {
            width: 100px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-left: 5px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            border-radius: 3px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            min-width: 100px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #aaa;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .all-text-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }

        .all-text-area.show {
            display: block;
        }

        .all-text-content {
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-family: monospace;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .tooltip {
            position: fixed;
            background: #333;
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .tooltip.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 PaddleOCR 文字識別</h1>
            <p class="subtitle">基於深度學習的高精度文字識別系統</p>
        </header>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">檢查中...</span>
            </div>
            <div class="status-item">
                <span>🖥️ GPU: Tesla P40</span>
            </div>
            <button class="btn btn-primary" onclick="checkHealth()">
                🔄 重新檢查
            </button>
        </div>

        <div class="config-section">
            <div class="config-row">
                <label>API 地址:</label>
                <input type="text" id="apiUrl" value="http://192.168.0.191:8002" placeholder="http://IP:PORT">
                <button class="btn btn-success" onclick="saveConfig()">💾 保存</button>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <h2 class="panel-title">📤 上傳圖片</h2>

                <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">點擊或拖放圖片到此處</div>
                    <div class="upload-hint">支持 JPG、PNG、BMP、GIF 格式</div>
                </div>
                <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">

                <div class="preview-container" id="previewContainer">
                    <div class="preview-wrapper">
                        <img id="previewImage" alt="預覽圖片">
                        <canvas id="bboxCanvas"></canvas>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-success" id="ocrBtn" onclick="performOCR()" disabled>
                        🚀 開始識別
                    </button>
                    <button class="btn btn-primary" onclick="clearAll()">
                        🗑️ 清除
                    </button>
                </div>
            </div>

            <div class="panel">
                <h2 class="panel-title">📝 識別結果</h2>

                <div class="error-message" id="errorMessage"></div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <div>正在識別中，請稍候...</div>
                </div>

                <div class="stats-bar" id="statsBar" style="display: none;">
                    <div class="stat-item">
                        <div class="stat-value" id="textCount">0</div>
                        <div class="stat-label">識別文字數</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="avgConfidence">0%</div>
                        <div class="stat-label">平均置信度</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="processTime">0ms</div>
                        <div class="stat-label">處理時間</div>
                    </div>
                </div>

                <div class="all-text-area" id="allTextArea">
                    <div class="all-text-content" id="allTextContent"></div>
                    <button class="copy-btn" onclick="copyAllText()">📋 複製全部文字</button>
                </div>

                <div class="results-area" id="resultsArea">
                    <div class="empty-state">
                        <div style="font-size: 3rem; margin-bottom: 15px;">📄</div>
                        <div>上傳圖片並點擊「開始識別」</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        let currentFile = null;
        let ocrResults = [];
        let imageScale = 1;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            checkHealth();
            setupDragDrop();
        });

        // 拖放功能
        function setupDragDrop() {
            const uploadArea = document.getElementById('uploadArea');

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, preventDefaults, false);
                document.body.addEventListener(eventName, preventDefaults, false);
            });

            ['dragenter', 'dragover'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => {
                    uploadArea.classList.add('dragover');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => {
                    uploadArea.classList.remove('dragover');
                }, false);
            });

            uploadArea.addEventListener('drop', handleDrop, false);
        }

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }

        // 文件選擇
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                handleFile(file);
            }
        }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('請選擇圖片文件');
                return;
            }

            currentFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('previewImage');
                img.src = e.target.result;
                img.onload = () => {
                    document.getElementById('previewContainer').classList.add('show');
                    document.getElementById('ocrBtn').disabled = false;
                    clearCanvas();
                };
            };
            reader.readAsDataURL(file);
        }

        // 健康檢查
        async function checkHealth() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            statusDot.className = 'status-dot checking';
            statusText.textContent = '檢查中...';

            try {
                // 使用代理路徑
                const response = await fetch('/api/health', {
                    method: 'GET'
                });

                if (response.ok) {
                    const data = await response.json();
                    statusDot.className = 'status-dot online';
                    statusText.textContent = `運行中 (${data.status || 'healthy'})`;
                } else {
                    throw new Error('API 響應錯誤');
                }
            } catch (error) {
                statusDot.className = 'status-dot offline';
                statusText.textContent = '無法連接';
                console.error('Health check failed:', error);
            }
        }

        // OCR 識別
        async function performOCR() {
            if (!currentFile) {
                showError('請先選擇圖片');
                return;
            }

            const loading = document.getElementById('loading');
            const resultsArea = document.getElementById('resultsArea');
            const ocrBtn = document.getElementById('ocrBtn');

            hideError();
            loading.classList.add('show');
            ocrBtn.disabled = true;
            resultsArea.innerHTML = '';
            document.getElementById('statsBar').style.display = 'none';
            document.getElementById('allTextArea').classList.remove('show');

            const startTime = performance.now();

            try {
                const formData = new FormData();
                formData.append('image', currentFile);

                // 使用代理路徑
                const response = await fetch('/api/ocr', {
                    method: 'POST',
                    body: formData
                });

                const endTime = performance.now();
                const processTime = Math.round(endTime - startTime);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success) {
                    ocrResults = data.results || [];
                    displayResults(ocrResults, processTime);
                    drawBboxes(ocrResults);
                } else {
                    throw new Error(data.error || '識別失敗');
                }
            } catch (error) {
                showError(`識別失敗: ${error.message}`);
                resultsArea.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3rem; margin-bottom: 15px;">❌</div>
                        <div>識別失敗，請檢查 API 連接</div>
                    </div>
                `;
            } finally {
                loading.classList.remove('show');
                ocrBtn.disabled = false;
            }
        }

        // 顯示結果
        function displayResults(results, processTime) {
            const resultsArea = document.getElementById('resultsArea');
            const statsBar = document.getElementById('statsBar');
            const allTextArea = document.getElementById('allTextArea');
            const allTextContent = document.getElementById('allTextContent');

            if (results.length === 0) {
                resultsArea.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3rem; margin-bottom: 15px;">🔍</div>
                        <div>未識別到文字</div>
                    </div>
                `;
                return;
            }

            // 統計信息
            const avgConf = results.reduce((sum, r) => sum + r.confidence, 0) / results.length;
            document.getElementById('textCount').textContent = results.length;
            document.getElementById('avgConfidence').textContent = Math.round(avgConf * 100) + '%';
            document.getElementById('processTime').textContent = processTime + 'ms';
            statsBar.style.display = 'flex';

            // 全部文字
            const allText = results.map(r => r.text).join('\n');
            allTextContent.textContent = allText;
            allTextArea.classList.add('show');

            // 單項結果
            resultsArea.innerHTML = results.map((result, index) => `
                <div class="result-item" data-index="${index}"
                     onmouseenter="highlightBbox(${index})"
                     onmouseleave="unhighlightBbox(${index})">
                    <div class="result-text">${escapeHtml(result.text)}</div>
                    <div class="result-meta">
                        <span>置信度: ${Math.round(result.confidence * 100)}%
                            <div class="confidence-bar">
                                <div class="confidence-fill" style="width: ${result.confidence * 100}%"></div>
                            </div>
                        </span>
                        <button class="copy-btn" onclick="copyText('${escapeHtml(result.text).replace(/'/g, "\\'")}')">
                            📋 複製
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 繪製邊界框
        function drawBboxes(results) {
            const canvas = document.getElementById('bboxCanvas');
            const img = document.getElementById('previewImage');
            const ctx = canvas.getContext('2d');

            // 設置 canvas 尺寸匹配圖片顯示尺寸
            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;

            // 計算縮放比例
            imageScale = img.clientWidth / img.naturalWidth;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            results.forEach((result, index) => {
                if (result.bbox && result.bbox.length === 4) {
                    const bbox = result.bbox.map(point => [
                        point[0] * imageScale,
                        point[1] * imageScale
                    ]);

                    ctx.beginPath();
                    ctx.moveTo(bbox[0][0], bbox[0][1]);
                    ctx.lineTo(bbox[1][0], bbox[1][1]);
                    ctx.lineTo(bbox[2][0], bbox[2][1]);
                    ctx.lineTo(bbox[3][0], bbox[3][1]);
                    ctx.closePath();

                    ctx.strokeStyle = '#00ff88';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    ctx.fillStyle = 'rgba(0, 255, 136, 0.1)';
                    ctx.fill();
                }
            });
        }

        function highlightBbox(index) {
            const canvas = document.getElementById('bboxCanvas');
            const ctx = canvas.getContext('2d');

            // 重繪所有框
            drawBboxes(ocrResults);

            // 高亮選中的框
            const result = ocrResults[index];
            if (result && result.bbox && result.bbox.length === 4) {
                const bbox = result.bbox.map(point => [
                    point[0] * imageScale,
                    point[1] * imageScale
                ]);

                ctx.beginPath();
                ctx.moveTo(bbox[0][0], bbox[0][1]);
                ctx.lineTo(bbox[1][0], bbox[1][1]);
                ctx.lineTo(bbox[2][0], bbox[2][1]);
                ctx.lineTo(bbox[3][0], bbox[3][1]);
                ctx.closePath();

                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.fillStyle = 'rgba(0, 212, 255, 0.3)';
                ctx.fill();
            }
        }

        function unhighlightBbox(index) {
            drawBboxes(ocrResults);
        }

        function clearCanvas() {
            const canvas = document.getElementById('bboxCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 複製功能
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                showTooltip('已複製!');
            }).catch(err => {
                console.error('複製失敗:', err);
            });
        }

        function copyAllText() {
            const allText = ocrResults.map(r => r.text).join('\n');
            navigator.clipboard.writeText(allText).then(() => {
                showTooltip('已複製全部文字!');
            }).catch(err => {
                console.error('複製失敗:', err);
            });
        }

        function showTooltip(message) {
            const tooltip = document.getElementById('tooltip');
            tooltip.textContent = message;
            tooltip.style.left = '50%';
            tooltip.style.top = '50%';
            tooltip.style.transform = 'translate(-50%, -50%)';
            tooltip.classList.add('show');
            setTimeout(() => {
                tooltip.classList.remove('show');
            }, 1500);
        }

        // 清除
        function clearAll() {
            currentFile = null;
            ocrResults = [];
            document.getElementById('fileInput').value = '';
            document.getElementById('previewContainer').classList.remove('show');
            document.getElementById('ocrBtn').disabled = true;
            document.getElementById('statsBar').style.display = 'none';
            document.getElementById('allTextArea').classList.remove('show');
            document.getElementById('resultsArea').innerHTML = `
                <div class="empty-state">
                    <div style="font-size: 3rem; margin-bottom: 15px;">📄</div>
                    <div>上傳圖片並點擊「開始識別」</div>
                </div>
            `;
            hideError();
            clearCanvas();
        }

        // 錯誤處理
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        // 配置
        function loadConfig() {
            const savedUrl = localStorage.getItem('paddleocr_api_url');
            if (savedUrl) {
                document.getElementById('apiUrl').value = savedUrl;
            }
        }

        function saveConfig() {
            const apiUrl = document.getElementById('apiUrl').value;
            localStorage.setItem('paddleocr_api_url', apiUrl);
            showTooltip('配置已保存!');
            checkHealth();
        }

        // 工具函數
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 響應式重繪
        window.addEventListener('resize', () => {
            if (ocrResults.length > 0) {
                setTimeout(() => drawBboxes(ocrResults), 100);
            }
        });
    </script>
</body>
</html>
